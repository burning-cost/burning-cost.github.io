title: "Burning Cost"
description: "On the forefront of machine learning and data science research in UK personal lines insurance. Helping teams adopt best practice, best-in-class tooling, and Databricks."
baseurl: ""
url: "https://burning-cost.github.io"

author:
  name: "Burning Cost"
  email: "pricing.frontier@gmail.com"

twitter:
  username: burningcost
  card: summary_large_image

social:
  name: Burning Cost
  links:
    - https://github.com/burning-cost

theme: minima

minima:
  skin: classic

header_pages:
  - course.md
  - tools.md
  - notebooks.md
  - about.md
  - compare.md

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

show_excerpts: true

markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  syntax_highlighter: rouge

permalink: /:year/:month/:day/:title/

github:
  - repo: "https://github.com/burning-cost/shap-relativities"

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
