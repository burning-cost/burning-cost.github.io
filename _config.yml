title: "Burning Cost"
description: "Open-source pricing tools for UK personal lines insurance teams. Python libraries covering the full pricing workflow: from walk-forward cross-validation to constrained rate optimisation."
baseurl: ""
url: "https://burning-cost.github.io"

author:
  name: "Burning Cost"
  email: "pricing.frontier@gmail.com"

twitter:
  username: burningcost
  card: summary

social:
  name: Burning Cost
  links:
    - https://github.com/burning-cost

theme: minima

minima:
  skin: classic

header_pages:
  - course.md
  - tools.md
  - about.md

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

show_excerpts: true

markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  syntax_highlighter: rouge

permalink: /:year/:month/:day/:title/

github:
  - repo: "https://github.com/burning-cost/shap-relativities"

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
