title: "Burning Cost"
description: "Open-source Python libraries for UK personal lines insurance pricing - SHAP relativities, causal inference, conformal prediction, spatial ratemaking, FCA compliance tools, PRA SS1/23 validation. 36 packages on PyPI with Databricks notebooks."
baseurl: ""
url: "https://burning-cost.github.io"

author:
  name: "Burning Cost"
  email: "pricing.frontier@gmail.com"

twitter:
  username: burningcost
  card: summary_large_image

social:
  name: Burning Cost
  links:
    - https://github.com/burning-cost

theme: minima

minima:
  skin: classic

header_pages:
  - tools.md
  - guide.md
  - notebooks.md
  - about.md
  - compare.md

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

show_excerpts: true

markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  syntax_highlighter: rouge

permalink: /:year/:month/:day/:title/

github:
  - repo: "https://github.com/burning-cost/shap-relativities"

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/

# Editorial rules (2026-03-19 quality audit)
# - Moratorium on new "Your X" titles. 31% of posts (33/107) already use this
#   pattern. It began as provocation; it is now cliche. Cannot rename existing
#   posts without breaking URLs. Do not add new ones.
# - New posts covering the same library as an existing post must explicitly
#   signal in the intro what angle they add. "Companion post" language required.
