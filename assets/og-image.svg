<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080b14"/>
      <stop offset="50%" style="stop-color:#0d1121"/>
      <stop offset="100%" style="stop-color:#111828"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Accent line -->
  <rect x="0" y="0" width="1200" height="4" fill="#4f7ef8"/>
  <!-- Logo text -->
  <text x="100" y="280" font-family="Inter, -apple-system, sans-serif" font-size="72" font-weight="800" letter-spacing="-2" fill="#eef0f6">Burning</text>
  <text x="100" y="360" font-family="Inter, -apple-system, sans-serif" font-size="72" font-weight="800" letter-spacing="-2" fill="#4f7ef8">Cost</text>
  <!-- Tagline -->
  <text x="100" y="430" font-family="Inter, -apple-system, sans-serif" font-size="28" font-weight="400" fill="#8b93ac">Open-source pricing tools for UK insurance teams</text>
  <!-- URL -->
  <text x="100" y="550" font-family="Inter, -apple-system, sans-serif" font-size="20" font-weight="600" fill="#4f7ef8">burning-cost.github.io</text>
</svg>
