<style>
/* === Base typography === */

body {
  font-size: 1rem;
  line-height: 1.7;
}

/* === Hero === */

.bc-hero {
  padding: 3rem 0 2.5rem;
  border-bottom: 2px solid #e8e8e8;
  margin-bottom: 3rem;
}

.bc-hero-label {
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: #c0392b;
  margin-bottom: 0.75rem;
}

.bc-hero h1 {
  font-size: 2.25rem;
  line-height: 1.15;
  margin-bottom: 1rem;
  font-weight: 700;
  letter-spacing: -0.01em;
}

.bc-hero-sub {
  font-size: 1.1rem;
  color: #444;
  max-width: 620px;
  margin-bottom: 0.5rem;
  line-height: 1.6;
}

.bc-hero-who {
  font-size: 0.9rem;
  color: #888;
  margin-bottom: 1.75rem;
  font-style: italic;
}

.bc-cta-row {
  display: flex;
  gap: 0.75rem;
  flex-wrap: wrap;
  margin-top: 1rem;
}

/* === Buttons === */

.bc-btn {
  display: inline-block;
  padding: 0.6rem 1.3rem;
  border-radius: 3px;
  font-size: 0.9rem;
  font-weight: 600;
  text-decoration: none;
  border: 2px solid #333;
  color: #333;
  background: transparent;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}

.bc-btn:hover {
  background: #333;
  color: #fff;
  text-decoration: none;
}

.bc-btn-primary {
  background: #c0392b;
  color: #fff;
  border-color: #c0392b;
}

.bc-btn-primary:hover {
  background: #a93226;
  border-color: #a93226;
  color: #fff;
}

/* === Credibility strip === */

.bc-stats {
  display: flex;
  gap: 0;
  border: 1px solid #e0e0e0;
  border-radius: 4px;
  margin-bottom: 3rem;
  overflow: hidden;
  background: #fff;
}

.bc-stat {
  flex: 1;
  padding: 1.25rem 1.5rem;
  border-right: 1px solid #e0e0e0;
  text-align: center;
}

.bc-stat:last-child {
  border-right: none;
}

.bc-stat-number {
  font-size: 2rem;
  font-weight: 700;
  color: #111;
  line-height: 1;
  display: block;
  margin-bottom: 0.3rem;
}

.bc-stat-label {
  font-size: 0.78rem;
  color: #888;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 600;
}

@media (max-width: 600px) {
  .bc-stats {
    flex-direction: column;
  }
  .bc-stat {
    border-right: none;
    border-bottom: 1px solid #e0e0e0;
  }
  .bc-stat:last-child {
    border-bottom: none;
  }
}

/* === Problem statement === */

.bc-problem {
  background: #fafafa;
  border-left: 3px solid #c0392b;
  padding: 1.4rem 1.75rem;
  margin-bottom: 3rem;
  font-size: 1rem;
  line-height: 1.7;
  color: #333;
}

.bc-problem p:last-child {
  margin-bottom: 0;
}

/* === Section headings === */

.bc-section-title {
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #aaa;
  margin-bottom: 1.5rem;
  margin-top: 0;
  border-bottom: 1px solid #ebebeb;
  padding-bottom: 0.5rem;
}

.bc-featured {
  margin-bottom: 3rem;
}

}

.bc-featured-card {

  border: 1px solid #e0e0e0;
  border-radius: 4px;

  display: flex;
  flex-direction: column;
}

.bc-featured-card:hover {

}

.bc-featured-tag {

  font-weight: 700;

}

.bc-featured-card h3 a {

  text-decoration: none;
}

.bc-featured-card h3 a:hover {
  color: #c0392b;
}

.bc-featured-card p {
  font-size: 0.855rem;
  color: #666;
  margin: 0;
  line-height: 1.5;
  flex-grow: 1;
}

  color: #f0f0f0;

}

.bc-course-label {
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: #c0392b;
  margin-bottom: 0.6rem;
}

.bc-course h2 {
  font-size: 1.3rem;
  font-weight: 700;
  color: #fff;
  margin: 0 0 0.75rem;
  border: none;
  padding: 0;
  letter-spacing: 0;
}

.bc-course-desc {
  font-size: 0.95rem;
  color: #bbb;
  margin-bottom: 1.25rem;
  max-width: 600px;
  line-height: 1.6;
}

.bc-course-modules {
  font-size: 0.8rem;
  color: #888;
  margin-bottom: 1.5rem;
  line-height: 1.7;
}

.bc-course-pricing {
  display: flex;
  gap: 1rem;
  flex-wrap: wrap;
  margin-bottom: 1.5rem;
}

.bc-price-item {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 4px;
  padding: 0.75rem 1rem;
  text-align: center;
  min-width: 110px;
}

.bc-price-amount {
  font-size: 1.4rem;
  font-weight: 700;
  color: #fff;
  display: block;
  line-height: 1;
  margin-bottom: 0.2rem;
}

.bc-price-label {
  font-size: 0.72rem;
  color: #888;
  letter-spacing: 0.06em;
}

.bc-course .bc-btn {
  border-color: #c0392b;
  color: #fff;
  background: #c0392b;
}

.bc-course .bc-btn:hover {
  background: #a93226;
  border-color: #a93226;
}

.bc-course .bc-btn-outline {
  background: transparent;
  border-color: rgba(255,255,255,0.3);
  color: #ccc;
}

.bc-course .bc-btn-outline:hover {
  background: rgba(255,255,255,0.08);
  color: #fff;
}

.bc-repos {
  margin-bottom: 3rem;
}

.bc-repo-group {
  margin-bottom: 2rem;
}

.bc-repo-group-label {

}

.bc-repo-list {

.bc-repo-item {

.bc-repo-item:hover {

.bc-repo-item a {

  font-size: 0.875rem;

  text-decoration: none;

  margin-bottom: 0.3rem;
}

.bc-repo-item a:hover {
  color: #c0392b;
  text-decoration: none;
}

.bc-repo-item p {
  font-size: 0.82rem;
  color: #666;
  margin: 0;
  line-height: 1.5;
}

/* === Posts list === */

.bc-posts {
  margin-bottom: 3rem;
}

.bc-post-list {
  list-style: none;
  margin: 0;
  padding: 0;
}

.bc-post-item {

}

.bc-post-item:last-child {

}

.bc-post-date {

.bc-post-item a {

  color: #333;
  text-decoration: none;
}

.bc-post-item a:hover {

}

.bc-newsletter {
  border: 1px solid #e0e0e0;
  border-radius: 4px;

  justify-content: space-between;

  flex-wrap: wrap;
}

.bc-newsletter-copy h3 {
  font-size: 1rem;
  font-weight: 700;
  margin: 0 0 0.3rem;
}

.bc-newsletter-copy p {
  font-size: 0.875rem;
  color: #666;
  margin: 0;
}

@media (max-width: 600px) {
  .bc-hero h1 {
    font-size: 1.7rem;
  }
  .bc-course {
    padding: 1.5rem 1.25rem;
  }
  .bc-newsletter {
    padding: 1.25rem;
  }
}
