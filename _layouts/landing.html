<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="canonical" href="{{ page.url | absolute_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  {% feed_meta %}
  {% seo %}
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #0b0e17;
      --navy-mid: #111520;
      --navy-card: #141928;
      --navy-border: #1d2438;
      --accent: #4f7ef8;
      --accent-hover: #6690f9;
      --accent-dim: rgba(79,126,248,0.12);
      --accent-glow: rgba(79,126,248,0.25);
      --text-primary: #eef0f6;
      --text-secondary: #8b93ac;
      --text-muted: #525c78;
      --white: #ffffff;
      --surface: #ffffff;
      --surface-alt: #f6f8fc;
      --border: #e3e7ef;
      --border-mid: #cdd3e2;
      --radius: 8px;
      --radius-lg: 12px;
      --mono: 'JetBrains Mono', 'Courier New', monospace;
      --sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    html { font-size: 16px; scroll-behavior: smooth; }

    body {
      font-family: var(--sans);
      color: #1a1d2e;
      background: var(--surface);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Navigation ──────────────────────────────────────────────── */

    .nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(11,14,23,0.97);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--navy-border);
    }

    .nav-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
    }

    .nav-logo {
      font-weight: 700;
      font-size: 1rem;
      color: var(--text-primary);
      letter-spacing: -0.01em;
      text-decoration: none;
    }

    .nav-logo:hover { text-decoration: none; color: var(--white); }

    .nav-logo span { color: var(--accent); }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      list-style: none;
    }

    .nav-links a {
      color: var(--text-secondary);
      font-size: 0.875rem;
      font-weight: 500;
      padding: 0.4rem 0.75rem;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
      text-decoration: none;
    }

    .nav-links a:hover {
      color: var(--text-primary);
      background: rgba(255,255,255,0.06);
      text-decoration: none;
    }

    .nav-links a.active { color: var(--text-primary); }

    .nav-cta {
      background: var(--accent) !important;
      color: var(--white) !important;
      padding: 0.4rem 0.9rem !important;
    }

    .nav-cta:hover {
      background: var(--accent-hover) !important;
      color: var(--white) !important;
    }

    /* ── Buttons ─────────────────────────────────────────────────── */

    .btn {
      display: inline-block;
      font-family: var(--sans);
      font-size: 0.9rem;
      font-weight: 600;
      padding: 0.65rem 1.4rem;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.15s;
      text-decoration: none;
      border: none;
    }

    .btn:hover { text-decoration: none; }

    .btn-primary {
      background: var(--accent);
      color: var(--white);
    }

    .btn-primary:hover {
      background: var(--accent-hover);
      color: var(--white);
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(79,126,248,0.4);
    }

    .btn-outline {
      background: transparent;
      color: var(--text-primary);
      border: 1px solid rgba(255,255,255,0.18);
    }

    .btn-outline:hover {
      background: rgba(255,255,255,0.06);
      color: var(--white);
      border-color: rgba(255,255,255,0.3);
    }

    .btn-outline-light {
      background: transparent;
      color: #3d4463;
      border: 1px solid var(--border-mid);
    }

    .btn-outline-light:hover {
      background: var(--surface-alt);
      color: #1a1d2e;
      border-color: #b0b8d0;
    }

    /* ── Hero ────────────────────────────────────────────────────── */

    .hero {
      background: var(--navy);
      padding: 5.5rem 1.5rem 5rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    /* Dot-grid texture */
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(79,126,248,0.18) 1px, transparent 1px);
      background-size: 28px 28px;
      mask-image: radial-gradient(ellipse 80% 60% at 50% 50%, black 30%, transparent 100%);
      -webkit-mask-image: radial-gradient(ellipse 80% 60% at 50% 50%, black 30%, transparent 100%);
      pointer-events: none;
    }

    /* Blue radial glow */
    .hero::after {
      content: '';
      position: absolute;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 800px;
      height: 600px;
      background: radial-gradient(ellipse, rgba(79,126,248,0.14) 0%, transparent 65%);
      pointer-events: none;
    }

    .hero-inner {
      position: relative;
      z-index: 1;
    }

    .hero-label {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-dim);
      border: 1px solid rgba(79,126,248,0.28);
      padding: 0.3rem 0.85rem;
      border-radius: 100px;
      margin-bottom: 1.75rem;
    }

    .hero-label::before {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
    }

    .hero h1 {
      font-size: clamp(2.25rem, 5.5vw, 3.75rem);
      font-weight: 800;
      line-height: 1.12;
      letter-spacing: -0.035em;
      color: var(--white);
      max-width: 820px;
      margin: 0 auto 1.4rem;
    }

    .hero h1 em {
      font-style: normal;
      background: linear-gradient(135deg, #7ba8fb 0%, #b197fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: 1.15rem;
      color: var(--text-secondary);
      max-width: 580px;
      margin: 0 auto 2.25rem;
      line-height: 1.7;
    }

    .hero-cta {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* ── Stats strip ─────────────────────────────────────────────── */

    .stats-strip {
      background: var(--navy-mid);
      border-top: 1px solid var(--navy-border);
      border-bottom: 1px solid var(--navy-border);
    }

    .stats-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1.75rem 1.5rem;
      display: flex;
      justify-content: center;
      gap: 0;
      flex-wrap: wrap;
    }

    .stat {
      text-align: center;
      padding: 0 2.5rem;
      position: relative;
    }

    .stat + .stat::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      height: 2rem;
      width: 1px;
      background: var(--navy-border);
    }

    .stat-number {
      display: block;
      font-size: 1.9rem;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.035em;
      line-height: 1;
    }

    .stat-label {
      display: block;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-top: 0.3rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ── Problem section ─────────────────────────────────────────── */

    .problem {
      padding: 4.5rem 1.5rem;
      background: var(--surface);
    }

    .problem-inner {
      max-width: 780px;
      margin: 0 auto;
    }

    .section-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1rem;
    }

    .problem h2 {
      font-size: 1.85rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      color: #1a1d2e;
      margin-bottom: 1.4rem;
      line-height: 1.28;
    }

    .problem p {
      font-size: 1.025rem;
      color: #3d4463;
      line-height: 1.8;
      margin-bottom: 1rem;
    }

    .problem p:last-child { margin-bottom: 0; }

    /* ── Libraries section ───────────────────────────────────────── */

    .libraries {
      background: var(--surface-alt);
      padding: 4.5rem 1.5rem;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }

    .section-header {
      max-width: 1100px;
      margin: 0 auto 3rem;
    }

    .section-header h2 {
      font-size: 1.85rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      color: #1a1d2e;
      margin-top: 0.5rem;
      margin-bottom: 0.6rem;
    }

    .section-header p {
      color: #5a6278;
      font-size: 1rem;
      line-height: 1.65;
    }

    .lib-group {
      max-width: 1100px;
      margin: 0 auto 2.5rem;
    }

    .lib-group:last-child { margin-bottom: 0; }

    .lib-group-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1rem;
      padding-bottom: 0.6rem;
      border-bottom: 1px solid var(--border);
    }

    .lib-group-icon {
      font-size: 1rem;
      line-height: 1;
      flex-shrink: 0;
    }

    .lib-group-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .lib-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 0.85rem;
    }

    .lib-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.2rem 1.35rem;
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
      display: block;
      text-decoration: none;
      position: relative;
    }

    .lib-card::after {
      content: '\2197';
      position: absolute;
      top: 1rem;
      right: 1rem;
      font-size: 0.75rem;
      color: var(--border-mid);
      transition: color 0.15s, transform 0.15s;
    }

    .lib-card:hover {
      border-color: var(--accent);
      box-shadow: 0 4px 20px rgba(79,126,248,0.12);
      transform: translateY(-2px);
      text-decoration: none;
    }

    .lib-card:hover::after {
      color: var(--accent);
      transform: translate(1px, -1px);
    }

    .lib-card-name {
      font-family: var(--mono);
      font-size: 0.83rem;
      font-weight: 600;
      color: var(--accent);
      display: block;
      margin-bottom: 0.45rem;
      padding-right: 1.5rem;
    }

    .lib-card-desc {
      font-size: 0.82rem;
      color: #5a6278;
      line-height: 1.55;
      display: block;
    }

    /* ── Course section ──────────────────────────────────────────── */

    .course {
      background: var(--navy);
      padding: 5rem 1.5rem;
      position: relative;
      overflow: hidden;
    }

    /* Dot-grid texture matching hero */
    .course::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(79,126,248,0.12) 1px, transparent 1px);
      background-size: 28px 28px;
      mask-image: radial-gradient(ellipse 90% 80% at 80% 50%, black 20%, transparent 100%);
      -webkit-mask-image: radial-gradient(ellipse 90% 80% at 80% 50%, black 20%, transparent 100%);
      pointer-events: none;
    }

    .course::after {
      content: '';
      position: absolute;
      bottom: -20%;
      right: -5%;
      width: 600px;
      height: 500px;
      background: radial-gradient(ellipse, rgba(79,126,248,0.1) 0%, transparent 65%);
      pointer-events: none;
    }

    .course-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3.5rem;
      align-items: start;
      position: relative;
      z-index: 1;
    }

    .course-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-dim);
      border: 1px solid rgba(79,126,248,0.28);
      padding: 0.25rem 0.7rem;
      border-radius: 100px;
      margin-bottom: 1rem;
    }

    .course-left h2 {
      font-size: 1.9rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      color: var(--white);
      line-height: 1.25;
      margin-bottom: 1rem;
    }

    .course-left p {
      font-size: 0.975rem;
      color: var(--text-secondary);
      line-height: 1.75;
      margin-bottom: 1.75rem;
    }

    .price-cards {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      margin-bottom: 1.75rem;
    }

    .price-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--navy-border);
      border-radius: var(--radius);
      padding: 0.85rem 1.1rem;
      flex: 1;
      min-width: 110px;
      transition: border-color 0.15s, background 0.15s;
    }

    .price-card:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.15);
    }

    .price-card--featured {
      background: var(--accent-dim);
      border-color: rgba(79,126,248,0.45);
      box-shadow: 0 0 24px rgba(79,126,248,0.12);
    }

    .price-card--featured:hover {
      background: rgba(79,126,248,0.18);
      border-color: rgba(79,126,248,0.65);
    }

    .price-card-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.3rem;
    }

    .price-card--featured .price-card-label {
      color: var(--accent);
    }

    .price-card-price {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.025em;
      line-height: 1;
    }

    .price-card-desc {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 0.3rem;
    }

    .course-modules-list {
      list-style: none;
    }

    .course-modules-list li {
      padding: 0.7rem 0;
      border-bottom: 1px solid var(--navy-border);
      display: flex;
      align-items: baseline;
      gap: 0.85rem;
    }

    .course-modules-list li:last-child { border-bottom: none; }

    .course-modules-list li:first-child { border-top: 1px solid var(--navy-border); }

    .mod-num {
      font-size: 0.68rem;
      font-weight: 700;
      color: var(--accent);
      font-family: var(--mono);
      min-width: 2rem;
      flex-shrink: 0;
    }

    .mod-title {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-primary);
      line-height: 1.4;
    }

    /* ── Blog section ────────────────────────────────────────────── */

    .posts {
      background: var(--surface);
      padding: 4.5rem 1.5rem;
      border-top: 1px solid var(--border);
    }

    .posts-inner {
      max-width: 1100px;
      margin: 0 auto;
    }

    .posts-header {
      margin-bottom: 2.25rem;
    }

    .posts-header h2 {
      font-size: 1.85rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      color: #1a1d2e;
      margin-top: 0.5rem;
    }

    .post-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1rem;
    }

    .post-card {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.4rem 1.5rem;
      background: var(--white);
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .post-card:hover {
      border-color: var(--accent);
      box-shadow: 0 4px 20px rgba(79,126,248,0.1);
      transform: translateY(-2px);
    }

    .post-date {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .post-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: #1a1d2e;
      line-height: 1.38;
    }

    .post-title a {
      color: inherit;
      text-decoration: none;
    }

    .post-title a:hover {
      color: var(--accent);
      text-decoration: none;
    }

    .post-excerpt {
      font-size: 0.82rem;
      color: #5a6278;
      line-height: 1.58;
      flex: 1;
    }

    .post-read-more {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--accent);
      text-decoration: none;
      margin-top: 0.25rem;
      display: inline-block;
    }

    .post-read-more:hover {
      color: var(--accent-hover);
      text-decoration: none;
    }

    .post-more {
      margin-top: 2rem;
      text-align: center;
    }

    /* ── Footer ──────────────────────────────────────────────────── */

    .footer {
      background: var(--navy);
      border-top: 1px solid var(--navy-border);
      padding: 2.5rem 1.5rem;
    }

    .footer-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .footer-brand {
      font-weight: 700;
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .footer-brand span { color: var(--accent); }

    .footer-links {
      display: flex;
      gap: 1.5rem;
      list-style: none;
    }

    .footer-links a {
      color: var(--text-muted);
      font-size: 0.85rem;
      text-decoration: none;
      transition: color 0.15s;
    }

    .footer-links a:hover { color: var(--text-secondary); text-decoration: none; }

    .footer-copy {
      color: var(--text-muted);
      font-size: 0.8rem;
      width: 100%;
      text-align: center;
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--navy-border);
    }

    /* ── Responsive ──────────────────────────────────────────────── */

    @media (max-width: 900px) {
      .course-inner { grid-template-columns: 1fr; gap: 2.5rem; }
    }

    @media (max-width: 768px) {
      .hero { padding: 3.75rem 1.25rem 3.25rem; }
      .hero h1 { font-size: 2.1rem; }
      .hero-sub { font-size: 1rem; }
      .stats-inner { gap: 0; flex-wrap: wrap; }
      .stat { flex: 1 1 40%; padding: 0.75rem 1rem; }
      .stat + .stat::before { display: none; }
      .nav-links { display: none; }
      .post-grid { grid-template-columns: 1fr; }
      .price-cards { flex-direction: column; }
      .lib-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 480px) {
      .stat-number { font-size: 1.5rem; }
      .hero h1 { font-size: 1.9rem; letter-spacing: -0.025em; }
      .problem h2, .course-left h2, .posts-header h2, .section-header h2 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-logo">Burning<span>Cost</span></a>
      <ul class="nav-links">
        <li><a href="/" class="active">Home</a></li>
        <li><a href="/course/">Course</a></li>
        <li><a href="/blog/">Blog</a></li>
        <li><a href="/about/">About</a></li>
        <li><a href="mailto:pricing.frontier@gmail.com?subject=Waitlist%3A%20Modern%20Insurance%20Pricing%20with%20Python%20and%20Databricks" class="btn btn-primary nav-cta">Join waitlist</a></li>
      </ul>
    </div>
  </nav>

  {{ content }}

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-brand">Burning<span>Cost</span></div>
      <ul class="footer-links">
        <li><a href="https://github.com/burningcost" target="_blank">GitHub</a></li>
        <li><a href="/course/">Course</a></li>
        <li><a href="/about/">About</a></li>
        <li><a href="mailto:pricing.frontier@gmail.com">Contact</a></li>
      </ul>
      <div class="footer-copy">Open-source pricing tools for UK insurance teams. Built by practitioners.</div>
    </div>
  </footer>

</body>
</html>
